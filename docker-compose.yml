# ==============================================================
# Accesco IMS — Docker Compose (Full Local Development Stack)
# ==============================================================
# Start everything:  docker compose up --build
# Stop everything:   docker compose down
# Reset database:    docker compose down -v
# ==============================================================

services:
  # ---- FastAPI Backend ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: accesco-backend
    ports:
      - "8000:8000"
    environment:
      # App
      PROJECT_NAME: "Accesco Living IMS"
      API_V1_STR: "/api/v1"
      DEBUG: "true"
      # Security
      JWT_SECRET_KEY: "supersecretkeythatisverylongandsecurechangeinproduction"
      JWT_ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      # Database — points to the 'postgres' service
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/accesco_ims"
      # Redis — points to the 'redis' service
      REDIS_URL: "redis://redis:6379/0"
      # Kafka — uses the internal listener (29092)
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      # Razorpay (test keys)
      RAZORPAY_KEY_ID: "rzp_test_mockkeyid123"
      RAZORPAY_KEY_SECRET: "mockkeysecret456"
      RAZORPAY_WEBHOOK_SECRET: "mockwebhooksecret789"
      # Entrypoint config
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: "postgres"
      RUN_SEED: "true"
    volumes:
      # Mount source code for live reload during development
      - .:/app
      # Prevent the host venv from overriding the container's packages
      - /app/venv
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---- PostgreSQL Database ----
  postgres:
    image: postgres:16-alpine
    container_name: accesco-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: accesco_ims
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Redis Cache ----
  redis:
    image: redis:7-alpine
    container_name: accesco-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Zookeeper (Kafka dependency) ----
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: accesco-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ---- Apache Kafka ----
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: accesco-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---- PgAdmin (Database Management UI) ----
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: accesco-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@accesco.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
